<!DOCTYPE html>
<html>
<head>
<title>PC Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#111;
color:white;
padding:15px;
}

nav a{
color:white;
margin-right:20px;
text-decoration:none;
}

.container{
width:90%;
margin:auto;
padding:20px;
}

footer{
text-align:center;
padding:20px;
background:#111;
color:white;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<h2>🖥 PC STORE</h2>

<nav>

<a href="/">Home</a>
<a href="/cart">Cart</a>
<a href="/orders">Orders</a>

{% if session.username %}

<span>Xin chào {{session.username}}</span>

<a href="/logout">Logout</a>

{% if session.role=="admin" %}
<a href="/admin">Admin</a>
{% endif %}

{% else %}

<a href="/login">Login</a>
<a href="/register">Register</a>

{% endif %}

</nav>

</header>

<div class="container">

{% block content %}
{% endblock %}

</div>

<footer>

<p>PC Store © 2026</p>

</footer>

</body>
</html>
