<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.box{
width:350px;
margin:100px auto;
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#28a745;
color:white;
border:none;
}

</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">

<input name="username" placeholder="Username" required>

<input name="password" type="password" placeholder="Password" required>

<button>Login</button>

</form>

<a href="/register">Create account</a>

</div>

</body>
</html>
