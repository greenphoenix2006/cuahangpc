<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.box{
width:350px;
margin:100px auto;
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
}

</style>
</head>

<body>

<div class="box">

<h2>Register</h2>

<form method="POST">

<input name="username" placeholder="Username" required>

<input name="password" type="password" placeholder="Password" required>

<input name="confirm" type="password" placeholder="Confirm Password" required>

<button>Create account</button>

</form>

</div>

</body>
</html>
